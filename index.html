<section class="controls">
  <h2>Add Activity</h2>

  <select id="day">
    <option value="day1">Day 1 (Chiang Mai)</option>
    <option value="day2">Day 2 (Mae Kampong)</option>
    <option value="day3">Day 3 (Return)</option>
  </select>

  <input type="time" id="time">
  <input type="text" id="activity" placeholder="Enter activity">
  <button onclick="addActivity()">Add</button>
</section>

<section class="timeline">
  <h2>Schedule</h2>

  <h3>Day 1</h3>
  <div id="day1"></div>

  <h3>Day 2</h3>
  <div id="day2"></div>

  <h3>Day 3</h3>
  <div id="day3"></div>
</section>
