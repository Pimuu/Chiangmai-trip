<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Chiang Mai Trip Planner</title>

  <!-- Leaflet -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Chiang Mai Trip Planner</h1>
  <p>3 Days 2 Nights Planner</p>
</header>

<div class="container">

  <!-- ADD -->
  <section class="controls">
    <h2>Add Activity</h2>

    <select id="day">
      <option value="day1">Day 1 (City)</option>
      <option value="day2">Day 2 (Mae Kampong)</option>
      <option value="day3">Day 3</option>
    </select>

    <input type="time" id="time">
    <input type="text" id="activity" placeholder="Place (e.g. Mae Kampong waterfall)">

    <button id="addBtn">Add</button>
  </section>

  <!-- TIMELINE -->
  <section class="timeline">
    <h2>Schedule</h2>

    <h3>Day 1</h3>
    <div id="day1"></div>

    <h3>Day 2</h3>
    <div id="day2"></div>

    <h3>Day 3</h3>
    <div id="day3"></div>
  </section>

  <!-- MAP -->
  <div id="map"></div>

  <!-- ROUTE BUTTON -->
  <a id="routeBtn" target="_blank">🚗 Open Full Route in Google Maps</a>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
