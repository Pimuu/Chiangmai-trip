<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mae Kampong Trip</title>
<style>
body {
  font-family: 'Arial';
  margin: 0;
  background: #f5f5f5;
}

header {
  background: url('https://images.unsplash.com/photo-1583394293214-28ded15ee548') center/cover;
  color: white;
  text-align: center;
  padding: 100px 20px;
}

.timeline {
  padding: 40px;
}

.card {
  background: white;
  margin: 15px 0;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.time {
  font-weight: bold;
  color: #2c7a7b;
}

footer {
  text-align: center;
  padding: 20px;
}
</style>
</head>

<body>

<header>
  <h1>Mae Kampong Trip</h1>
  <p>3 Days 2 Nights Plan</p>
</header>

<div class="timeline">

  <h2>Day 1</h2>

  <div class="card">
    <div class="time">08:00</div>
    Leave Chiang Mai
  </div>

  <div class="card">
    <div class="time">10:00</div>
    Arrive at Mae Kampong Village
  </div>

  <div class="card">
    <div class="time">11:30</div>
    Café hopping ☕
  </div>

  <div class="card">
    <div class="time">15:00</div>
    Visit waterfall
  </div>

</div>

<footer>
  <p>Trip plan for my friend ❤️</p>
</footer>

</body>
</html>
