<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Trip Planner</title>

  <!-- Leaflet (MAP LIBRARY) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>Chiang Mai Trip Planner</h1>
</header>

<div class="container">

  <section class="controls">
    <h2>Add Activity</h2>

    <select id="day">
      <option value="day1">Day 1</option>
      <option value="day2">Day 2</option>
      <option value="day3">Day 3</option>
    </select>

    <input type="time" id="time">
    <input type="text" id="activity" placeholder="Place name (e.g. Mae Kampong)">
    
    <button id="addBtn">Add</button>
  </section>

  <section class="timeline">
    <h2>Schedule</h2>

    <h3>Day 1</h3>
    <div id="day1" class="dropzone"></div>

    <h3>Day 2</h3>
    <div id="day2" class="dropzone"></div>

    <h3>Day 3</h3>
    <div id="day3" class="dropzone"></div>
  </section>

  <div id="map"></div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="script.js"></script>

</body>
</html>
